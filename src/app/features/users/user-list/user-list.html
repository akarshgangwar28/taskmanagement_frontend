<div class="max-w-7xl mx-auto space-y-8">
  <div class="flex items-center justify-between mt-4">
    <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Organization Overview</h2>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <!-- Team Leads -->
    <div class="bg-white/70 backdrop-blur-md rounded-3xl p-6 shadow-xl border border-white/40">
      <h3 class="text-lg font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2">Team Leads</h3>
      <div class="space-y-3">
        <div *ngFor="let tl of getTeamLeads()" class="p-4 bg-white rounded-xl shadow-sm border border-slate-100 flex justify-between items-center">
          <div>
            <p class="font-semibold text-slate-800">{{ tl.username }}</p>
            <p class="text-xs text-slate-500">{{ tl.email }}</p>
          </div>
          <span class="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs font-medium">Team Lead</span>
        </div>
        <div *ngIf="getTeamLeads().length === 0" class="text-sm text-slate-500 italic">No Team Leads registered.</div>
      </div>
    </div>

    <!-- Employees -->
    <div class="bg-white/70 backdrop-blur-md rounded-3xl p-6 shadow-xl border border-white/40">
      <h3 class="text-lg font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2">Employees</h3>
      <div class="space-y-3">
        <div *ngFor="let emp of getEmployees()" class="p-4 bg-white rounded-xl shadow-sm border border-slate-100 space-y-3">
          <div class="flex justify-between items-center">
            <div>
              <p class="font-semibold text-slate-800">{{ emp.username }}</p>
              <p class="text-xs text-slate-500">{{ emp.email }}</p>
            </div>
            <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-xs font-medium">Employee</span>
          </div>
          
          <div class="pt-2 border-t border-slate-100 flex items-center justify-between space-x-3">
            <label class="text-xs font-medium text-slate-600">Assign To Team Lead:</label>
            <select [value]="emp.teamLead || ''" (change)="assignLead(emp.id, $any($event.target).value)"
              class="text-sm px-3 py-1.5 rounded bg-slate-50 border border-slate-200 focus:outline-none focus:ring-1 focus:ring-indigo-500 flex-1">
              <option value="">-- No Team --</option>
              <option *ngFor="let tl of getTeamLeads()" [value]="tl.id">{{ tl.username }}</option>
            </select>
          </div>
        </div>
        <div *ngIf="getEmployees().length === 0" class="text-sm text-slate-500 italic">No Employees registered.</div>
      </div>
    </div>
  </div>
</div>
