<div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-100 max-w-2xl w-full mx-auto">
  <h3 class="text-xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3">
    {{ isEditMode() ? 'Edit Task' : 'Create New Task' }}
  </h3>
  
  <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="space-y-5">
    <div>
      <label for="title" class="block text-sm font-medium text-slate-700 mb-1">Title</label>
      <input type="text" id="title" formControlName="title"
        class="appearance-none rounded-lg block w-full px-4 py-2 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
        placeholder="E.g., Design homepage">
      <p *ngIf="taskForm.controls.title.touched && taskForm.controls.title.errors?.['required']" class="mt-1 text-xs text-red-600">Title is required.</p>
    </div>

    <div>
      <label for="description" class="block text-sm font-medium text-slate-700 mb-1">Description</label>
      <textarea id="description" formControlName="description" rows="4"
        class="appearance-none rounded-lg block w-full px-4 py-2 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all resize-none"
        placeholder="Detailed description of the task..."></textarea>
      <p *ngIf="taskForm.controls.description.touched && taskForm.controls.description.errors?.['required']" class="mt-1 text-xs text-red-600">Description is required.</p>
    </div>

    <div *ngIf="isEditMode()">
      <label for="status" class="block text-sm font-medium text-slate-700 mb-1">Status</label>
      <select id="status" formControlName="status"
        class="appearance-none rounded-lg block w-full px-4 py-2 border border-slate-300 bg-white text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all cursor-pointer">
        <option value="pending">Pending</option>
        <option value="completed">Completed</option>
      </select>
    </div>

    <div *ngIf="auth.currentUser()?.role === 'Manager' || auth.currentUser()?.role === 'Team Lead'">
      <label for="assignedTo" class="block text-sm font-medium text-slate-700 mb-1">Assigned To</label>
      <select id="assignedTo" formControlName="assignedTo"
        class="appearance-none rounded-lg block w-full px-4 py-2 border border-slate-300 bg-white text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all cursor-pointer">
        <option value="">Select an Assignee</option>
        <option *ngFor="let u of users()" [value]="u.id">
          {{ u.username }} ({{ u.role }})
        </option>
      </select>
    </div>

    <div class="flex items-center justify-end space-x-3 pt-4 border-t border-slate-100">
      <button type="button" (click)="onCancel()"
        class="px-5 py-2.5 border border-slate-300 text-sm font-medium rounded-lg text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all shadow-sm">
        Cancel
      </button>
      <button type="submit"
        class="px-5 py-2.5 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all shadow-sm active:scale-[0.98]">
        {{ isEditMode() ? 'Save Changes' : 'Create Task' }}
      </button>
    </div>
  </form>
</div>
