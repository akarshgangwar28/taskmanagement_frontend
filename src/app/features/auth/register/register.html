<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-slate-100">
    <div>
      <h2 class="mt-2 text-center text-3xl font-extrabold text-slate-900 tracking-tight">
        Create an account
      </h2>
      <p class="mt-2 text-center text-sm text-slate-500">
        Or
        <a routerLink="/login" class="font-medium text-indigo-600 hover:text-indigo-500 transition-colors">
          sign in to your existing account
        </a>
      </p>
    </div>

    <!-- Error message display -->
    <div *ngIf="errorMessage()" class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
      <div class="flex">
        <div class="flex-shrink-0">
          <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
          </svg>
        </div>
        <div class="ml-3">
          <p class="text-sm text-red-700">{{ errorMessage() }}</p>
        </div>
      </div>
    </div>

    <form class="mt-8 space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4 shadow-sm">
        <div>
          <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
          <input id="username" formControlName="username" type="text" required 
            class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all" 
            placeholder="johndoe">
          
          <p *ngIf="registerForm.controls.username.touched && registerForm.controls.username.errors?.['required']" class="mt-1 text-xs text-red-600">Username is required.</p>
          <p *ngIf="registerForm.controls.username.touched && registerForm.controls.username.errors?.['minlength']" class="mt-1 text-xs text-red-600">At least 3 characters.</p>
        </div>

        <div>
          <label for="email-address" class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
          <input id="email-address" formControlName="email" type="email" autocomplete="email" required 
            class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all" 
            placeholder="johndoe@example.com">
          
          <p *ngIf="registerForm.controls.email.touched && registerForm.controls.email.errors?.['required']" class="mt-1 text-xs text-red-600">Email is required.</p>
          <p *ngIf="registerForm.controls.email.touched && registerForm.controls.email.errors?.['email']" class="mt-1 text-xs text-red-600">Please enter a valid email.</p>
        </div>
        
        <div>
          <label for="role" class="block text-sm font-medium text-slate-700 mb-1">Role</label>
          <select id="role" formControlName="role" 
            class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-slate-300 bg-white text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all cursor-pointer">
            <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
          </select>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input id="password" formControlName="password" type="password" autocomplete="new-password" required 
            class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all" 
            placeholder="********">
            
          <p *ngIf="registerForm.controls.password.touched && registerForm.controls.password.errors?.['required']" class="mt-1 text-xs text-red-600">Password is required.</p>
          <p *ngIf="registerForm.controls.password.touched && registerForm.controls.password.errors?.['minlength']" class="mt-1 text-xs text-red-600">At least 6 characters.</p>
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="isLoading()"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all shadow-md active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed">
          
          <span *ngIf="isLoading()" class="absolute left-0 inset-y-0 flex items-center pl-3">
            <!-- Spinner -->
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </span>
          {{ isLoading() ? 'Creating account...' : 'Create account' }}
        </button>
      </div>
    </form>
  </div>
</div>
